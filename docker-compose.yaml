version: '3.9'

services:
  mongodb:
    # Cria a imagem do mongo dentro do docker
    image: mongo:7.0 # Define para versão 7
    container_name: mongodb
    restart: always

    ports:
      # Joga a porta interna 27017 para a externa 27030
      - "27030:27017"

    volumes:
      # Cria um volume para persistencia dos dados
      - mongo_data:/data/db

volumes:
  mongo_data:
